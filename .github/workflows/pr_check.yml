name: Flutter PR Check

on:
  pull_request:
    branches: [master]

jobs:
  check:
    name: Analyze, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Unit tests
        run: flutter test test/unit/ --reporter=expanded

      - name: Widget tests
        run: flutter test test/widget/ --reporter=expanded

      - name: Inject google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Build debug APK
        run: flutter build apk --debug
