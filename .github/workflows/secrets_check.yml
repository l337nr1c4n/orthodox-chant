name: Secrets Health Check

on:
  workflow_dispatch:

jobs:
  check:
    name: Verify All CI Secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Check all secrets are present
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          failed=0
          for secret in KEYSTORE_BASE64 KEY_ALIAS KEY_PASSWORD STORE_PASSWORD GOOGLE_SERVICES_JSON FIREBASE_APP_ID FIREBASE_TOKEN; do
            if [ -z "${!secret}" ]; then
              echo "MISSING: $secret"
              failed=1
            else
              echo "OK: $secret"
            fi
          done
          exit $failed

      - name: Validate KEYSTORE_BASE64 decodes to valid PKCS12
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/check.jks
          keytool -list -keystore /tmp/check.jks -storepass "$STORE_PASSWORD" -storetype PKCS12 -noprompt
          rm -f /tmp/check.jks

      - name: Validate GOOGLE_SERVICES_JSON decodes to valid JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode | python3 -m json.tool > /dev/null
          echo "OK: GOOGLE_SERVICES_JSON is valid JSON"

      - name: Validate FIREBASE_APP_ID format
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          if [[ "$FIREBASE_APP_ID" =~ ^[0-9]+:[0-9]+:android:[a-f0-9]+$ ]]; then
            echo "OK: FIREBASE_APP_ID format is valid"
          else
            echo "INVALID: FIREBASE_APP_ID does not match expected format 1:XXXXXXXXXX:android:XXXXXXXX"
            exit 1
          fi
